<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ferrotodo</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="header">
    <h1>FERROTODO</h1>

    <nav>
        <button onclick="mostrarSeccion('inicio')">Inicio</button>
        <button onclick="mostrarSeccion('productos')">Productos</button>
        <button onclick="mostrarSeccion('carrito')">Carrito 🛒</button>
        <button onclick="toggleDarkMode()">🌙</button>
    </nav>

    <img src="img/logo.png" alt="Logo Ferrotodo" class="logo">
</header>

<section id="inicio" class="seccion">
    <h2>Bienvenido</h2>
    <p>Tu ferretería de confianza</p>
</section>

<section id="productos" class="seccion oculto">
    <h2>Productos</h2>

    <div class="producto">
        <img src="img/martillo.jpg">
        <h3>Martillo</h3>
        <p>Bs 50</p>
        <button onclick="agregarCarrito('Martillo',50)">Agregar</button>
    </div>

    <div class="producto">
        <img src="img/taladro.jpg">
        <h3>Taladro</h3>
        <p>Bs 350</p>
        <button onclick="agregarCarrito('Taladro',350)">Agregar</button>
    </div>

</section>

<section id="carrito" class="seccion oculto">
    <h2>Carrito</h2>
    <ul id="listaCarrito"></ul>
    <h3>Total: Bs <span id="total">0</span></h3>
</section>

<footer>
    <p>© 2026 Ferrotodo</p>
</footer>

<script src="script.js"></script>
</body>
</html>
